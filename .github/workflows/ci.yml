name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      use_self_hosted:
        description: "Run jobs on self-hosted runner"
        type: boolean
        required: false
        default: false

jobs:
  go-checks:
    name: Go Build and Test
    runs-on: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_self_hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build module
        run: go build ./...

  govulncheck:
    name: Go Vulnerability Check
    runs-on: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_self_hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_self_hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy fs scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: table

  trivy-image:
    name: Docker Build and Image Scan (${{ matrix.platform }})
    runs-on: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_self_hosted == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            image_suffix: amd64
          - platform: linux/arm64
            image_suffix: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: docker buildx build --platform "${{ matrix.platform }}" --load -t "whatismyip:ci-${{ matrix.image_suffix }}" .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: whatismyip:ci-${{ matrix.image_suffix }}
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: table
